name: CI

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "docker/**"
      - "turbo.json"
      - "package.json"
      - "bun.lock"

  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "docker/**"
      - "turbo.json"
      - "package.json"
      - "bun.lock"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install Dependencies
        run: bun install

      - name: Generate Prisma Client
        run: DATABASE_URL="postgresql://p:p@localhost:5432/p" bunx prisma generate --schema=packages/db/prisma/schema.prisma

      - name: Run Lint
        run: bun run lint

      - name: Run Build
        run: bun run build

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: quality

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Files
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          fi

          echo "$CHANGED_FILES"

          echo "backend=false" >> $GITHUB_OUTPUT
          echo "frontend=false" >> $GITHUB_OUTPUT

          if echo "$CHANGED_FILES" | grep -q '^apps/backend/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^apps/frontend/'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^docker/backend\.dockerfile$'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^docker/frontend\.dockerfile$'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^packages/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
          fi

      - name: Save Changed Services
        run: |
          mkdir -p changed

          echo '${{ steps.filter.outputs.backend }}' > changed/backend
          echo '${{ steps.filter.outputs.frontend }}' > changed/frontend

      - name: Upload Changed Services
        uses: actions/upload-artifact@v4
        with:
          name: changed-services
          path: changed/

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest

    needs:
      - quality
      - detect-changes

    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    env:
      BASE_RUN: 4
      BASE_MINOR: 4

    strategy:
      fail-fast: false

      matrix:
        include:
          - service: backend
            dockerfile: docker/backend.dockerfile
            image: evalio-backend
            changed: ${{ needs.detect-changes.outputs.backend }}

          - service: frontend
            dockerfile: docker/frontend.dockerfile
            image: evalio-frontend
            changed: ${{ needs.detect-changes.outputs.frontend }}

    steps:
      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@v4

      - name: Compute Version
        if: matrix.changed == 'true'
        id: version
        shell: bash
        run: |
          OFFSET=$(( ${{ github.run_number }} - ${{ env.BASE_RUN }} ))
          MINOR=$(( OFFSET / 10 + ${{ env.BASE_MINOR }} ))
          PATCH=$(( OFFSET % 10 ))
          echo "tag=v1.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.version.outputs.tag }}

          cache-from: type=gha
          cache-to: type=gha,mode=max
